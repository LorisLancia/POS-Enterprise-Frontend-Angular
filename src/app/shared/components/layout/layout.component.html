<div class="layout" [class.sidebar-closed]="!sidebarOpen">
  <aside class="sidebar">
    <div class="logo">POS Enterprise</div>
    <nav class="menu">
      <a *ngFor="let item of menuItems" [routerLink]="item.route" routerLinkActive="active" class="menu-item">
        <span class="icon">{{item.icon}}</span>
        <span class="label">{{item.label}}</span>
      </a>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="toggle-btn" (click)="toggleSidebar()">☰</button>
      <span class="title">Backoffice</span>
      <div class="user-info">
        <span *ngIf="user$ | async as user">{{user.full_name}} ({{user.role}})</span>
        <button class="logout-btn" (click)="logout()">Logout</button>
      </div>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
