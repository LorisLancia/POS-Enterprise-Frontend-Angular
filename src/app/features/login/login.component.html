<div class="login-container">
  <div class="login-card">
    <h2>POS Enterprise</h2>
    <p class="subtitle">Backoffice Login</p>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" [(ngModel)]="username" placeholder="admin">
    </div>

    <div class="mb-3">
      <label class="form-label">PIN</label>
      <input type="password" class="form-control" [(ngModel)]="pin" placeholder="123456">
    </div>

    <div class="mb-3">
      <label class="form-label">Store ID</label>
      <input type="number" class="form-control" [(ngModel)]="companyId">
    </div>

    <div class="alert alert-danger" *ngIf="error">{{error}}</div>

    <button class="btn btn-primary w-100" (click)="login()" [disabled]="loading">
      {{loading ? 'Loading...' : 'Login'}}
    </button>
  </div>
</div>
