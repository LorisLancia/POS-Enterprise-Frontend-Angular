<h1 class="mb-4">Dashboard</h1>
<div class="row g-4">
  <div class="col-md-3">
    <div class="card text-center p-4">
      <div class="display-4">📦</div>
      <h2 class="text-primary">{{stats.products}}</h2>
      <p class="text-muted">Products</p>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card text-center p-4">
      <div class="display-4">🏷️</div>
      <h2 class="text-primary">{{stats.materials}}</h2>
      <p class="text-muted">Materials</p>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card text-center p-4">
      <div class="display-4">🛒</div>
      <h2 class="text-primary">{{stats.sales}}</h2>
      <p class="text-muted">Sales</p>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card text-center p-4">
      <div class="display-4">📋</div>
      <h2 class="text-primary">{{stats.shifts}}</h2>
      <p class="text-muted">Shifts</p>
    </div>
  </div>
</div>
